name: code_review
description: Multi-file source code review with per-file analysis and synthesis

phases:
  - name: discover
    context:
      task:      {type: task}
      file_list: {type: list_files}
    system_prompt: |
      You are a code reviewer. Given a task and a list of available files,
      identify which source code files are most relevant to reviewing.
      Ignore non-code files (READMEs, configs, go.sum, etc.) unless the
      task specifically asks about them.
    user_prompt: |
      Task: {task}

      Available files in the workspace:
      {file_list}

      List the files most relevant for this review.
    output_schema:
      type: object
      properties:
        files:
          type: array
          items: {type: string}
    output_field: files

  - name: analyze
    batch_over: files
    skip_conditions:
      max_size_kb: 500
      text_only: true
    context:
      task:         {type: task}
      file_content: {type: read_file, path: "{item}"}
      language:     {type: detect_language, path: "{item}"}
    system_prompt: |
      You are an expert {language} code reviewer. Focus on: {task}.
      Be precise and concise. Output valid JSON.
    user_prompt: |
      Review this {language} file:

      ```{language}
      {file_content}
      ```

      Check for: correctness, performance issues, idiomatic code,
      edge cases, security concerns, and any bugs.
    output_schema:
      type: object
      properties:
        observations: {type: array, items: {type: string}}
        issues:       {type: array, items: {type: string}}
        suggestions:  {type: array, items: {type: string}}
        concepts:     {type: array, items: {type: string}}

  - name: synthesize
    context:
      task:         {type: task}
      observations: {type: previous_output, phase: analyze, key: observations, aggregate: json}
    system_prompt: |
      You are a senior engineer synthesizing per-file code review findings
      into a unified report. Group findings by priority, note cross-cutting
      concerns that span multiple files, and provide actionable recommendations.
    user_prompt: |
      Task: {task}

      Per-file observations:
      {observations}

      Synthesize into a unified code review.
    output_schema:
      type: object
      properties:
        summary:          {type: string}
        priority_fixes:   {type: array, items: {type: string}}
        architecture_notes: {type: array, items: {type: string}}
        cross_cutting:    {type: array, items: {type: string}}
